name: BuildTest
on:
  pull_request:
    branches: ["dev", "features/dev_actions"]
  workflow_dispatch:

jobs:
  VoiceCraft-Tests:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest, macos-26]
      fail-fast: false
    steps:
      - uses: actions/checkout@v5
      - name: Setup Dotnet
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: ${{ startsWith(matrix.os, 'macos') && '9.0.312' || '9.0.x' }}

      - name: Restore Core Tests
        run: dotnet restore ./VoiceCraft.Core.Tests/VoiceCraft.Core.Tests.csproj

      - name: Restore Client Tests
        run: dotnet restore ./VoiceCraft.Client.Tests/VoiceCraft.Client.Tests.csproj

      - name: Restore Network Tests
        run: dotnet restore ./VoiceCraft.Network.Tests/VoiceCraft.Network.Tests.csproj

      - name: Run Core Tests
        run: dotnet test ./VoiceCraft.Core.Tests/VoiceCraft.Core.Tests.csproj -c Release --no-restore

      - name: Run Client Tests
        run: dotnet test ./VoiceCraft.Client.Tests/VoiceCraft.Client.Tests.csproj -c Release --no-restore

      - name: Run Network Tests
        run: dotnet test ./VoiceCraft.Network.Tests/VoiceCraft.Network.Tests.csproj -c Release --no-restore

  VoiceCraft-Client-Windows:
    runs-on: windows-latest
    strategy:
      matrix:
        arch: [ x64, x86, arm64 ]
      fail-fast: false
    defaults:
      run:
        working-directory: ./VoiceCraft.Client/VoiceCraft.Client.Windows
    steps:
      - uses: actions/checkout@v5
      - name: Setup Dotnet
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: "9.0.x"

      - name: Install WorkLoads
        run: dotnet workload restore

      - name: Publish Build
        run: dotnet publish -c Release -r win-${{ matrix.arch }} -p:PublishSingleFile=true

      - name: Download VC++ Redistributable
        shell: pwsh
        run: |
          $uri = "https://aka.ms/vc14/vc_redist.${{ matrix.arch }}.exe"
          $outFile = "./bin/Release/net9.0-windows/win-${{ matrix.arch }}/publish/vc_redist.${{ matrix.arch }}.exe"
          Invoke-WebRequest -Uri $uri -OutFile $outFile

      - name: Upload Artifact
        uses: actions/upload-artifact@v6
        with:
          name: VoiceCraft.Client.Windows.${{ matrix.arch }}
          path: ./VoiceCraft.Client/VoiceCraft.Client.Windows/bin/Release/net9.0-windows/win-${{ matrix.arch }}/publish/
  
  VoiceCraft-Client-Linux:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        arch: [ x64, arm, arm64 ]
      fail-fast: false
    defaults:
      run:
        working-directory: ./VoiceCraft.Client/VoiceCraft.Client.Linux
    steps:
      - uses: actions/checkout@v5
      - name: Setup Dotnet
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: "9.0.x"

      - name: Install WorkLoads
        run: dotnet workload restore

      - name: Publish Build
        run: dotnet publish -c Release -r linux-${{ matrix.arch }} -p:PublishSingleFile=true

      - name: Upload Artifact
        uses: actions/upload-artifact@v6
        with:
          name: VoiceCraft.Client.Linux.${{ matrix.arch }}
          path: ./VoiceCraft.Client/VoiceCraft.Client.Linux/bin/Release/net9.0/linux-${{ matrix.arch }}/publish/
  
  VoiceCraft-Client-Android:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        arch: [arm, arm64]
      fail-fast: false
    defaults:
      run:
        working-directory: ./VoiceCraft.Client/VoiceCraft.Client.Android
    env:
      ANDROID_KEYSTORE: ${{ secrets.ANDROID_KEYSTORE }}
      ALIAS: ${{ secrets.ALIAS }}
      KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
    steps:
      - uses: actions/checkout@v5

      - name: Setup Dotnet
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: "9.0.x"

      - name: Install WorkLoads
        run: dotnet workload restore

      - name: Setup Keystore File
        if: ${{ github.event_name != 'pull_request' && env.ANDROID_KEYSTORE != '' }}
        run: echo "$ANDROID_KEYSTORE" | base64 --decode > android.keystore

      - name: Publish Build (Signed)
        if: ${{ github.event_name != 'pull_request' && env.ANDROID_KEYSTORE != '' }}
        run: >
          dotnet publish -c Release -r android-${{ matrix.arch }}
          -p:AndroidKeyStore=true
          -p:AndroidSigningKeyStore=./android.keystore
          -p:AndroidSigningKeyAlias=$ALIAS
          -p:AndroidSigningKeyPass=$KEYSTORE_PASSWORD
          -p:AndroidSigningStorePass=$KEYSTORE_PASSWORD

      - name: Publish Build (Unsigned)
        if: ${{ github.event_name == 'pull_request' || env.ANDROID_KEYSTORE == '' }}
        run: dotnet publish -c Release -r android-${{ matrix.arch }}

      - name: Upload Artifact
        uses: actions/upload-artifact@v6
        with:
          name: VoiceCraft.Client.Android.${{ matrix.arch }}
          path: ./VoiceCraft.Client/VoiceCraft.Client.Android/bin/Release/net9.0-android/android-${{ matrix.arch }}/publish/*.apk

  VoiceCraft-Client-iOS:
    runs-on: macos-26
    defaults:
      run:
        working-directory: ./VoiceCraft.Client/VoiceCraft.Client.iOS
    steps:
      - uses: actions/checkout@v5
      - name: Setup Dotnet
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: "9.0.312"

      - name: Install WorkLoads
        run: dotnet workload restore

      - name: Publish Build (Unsigned IPA)
        run: dotnet publish -c Release -r ios-arm64 -p:BuildIpa=true -p:EnableCodeSigning=false -p:ValidateXcodeVersion=false

      - name: Upload Artifact
        uses: actions/upload-artifact@v6
        with:
          name: VoiceCraft.Client.iOS.arm64
          path: ./VoiceCraft.Client/VoiceCraft.Client.iOS/bin/Release/net9.0-ios/ios-arm64/publish/*.ipa
  
  VoiceCraft-Client-MacOS:
    runs-on: macos-26
    strategy:
      matrix:
        arch: [ x64, arm64 ]
      fail-fast: false
    defaults:
      run:
        working-directory: ./VoiceCraft.Client/VoiceCraft.Client.MacOS
    steps:
      - uses: actions/checkout@v5
      - name: Setup Dotnet
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: "9.0.312"

      - name: Install WorkLoads
        run: dotnet workload restore

      - name: Restore ${{ matrix.arch }} Workloads
        run: dotnet restore -r osx-${{ matrix.arch }}

      - name: Publish Build
        run: dotnet publish -c Release -r osx-${{ matrix.arch }} --no-restore -p:ValidateXcodeVersion=false

      - name: Build VoiceCraft.Client.MacOS.${{ matrix.arch }}.dmg
        run: |
          cd ./bin/Release/net9.0-macos/osx-${{ matrix.arch }}
          APP_BUNDLE=$(find . -maxdepth 1 -name "*.app" -print -quit)
          if [ -z "$APP_BUNDLE" ]; then
            echo "No .app bundle found"
            exit 1
          fi
          rm -rf dmg-root
          mkdir -p dmg-root
          cp -R "$APP_BUNDLE" dmg-root/
          ln -s /Applications dmg-root/Applications
          hdiutil create \
            -volname "VoiceCraft" \
            -srcfolder dmg-root \
            -ov \
            -format UDZO \
            VoiceCraft.Client.MacOS.${{ matrix.arch }}.dmg

      - name: Normalize VoiceCraft.Client.MacOS.${{ matrix.arch }}.pkg name
        run: |
          cd ./bin/Release/net9.0-macos/osx-${{ matrix.arch }}
          PKG_PATH=$(ls ./publish/*.pkg | head -n 1)
          cp "$PKG_PATH" "VoiceCraft.Client.MacOS.${{ matrix.arch }}.pkg"

      - name: Upload Artifact
        uses: actions/upload-artifact@v6
        with:
          name: VoiceCraft.Client.MacOS.${{ matrix.arch }}.dmg
          path: ./VoiceCraft.Client/VoiceCraft.Client.MacOS/bin/Release/net9.0-macos/osx-${{ matrix.arch }}/VoiceCraft.Client.MacOS.${{ matrix.arch }}.dmg

      - name: Upload Artifact
        uses: actions/upload-artifact@v6
        with:
          name: VoiceCraft.Client.MacOS.${{ matrix.arch }}.pkg
          path: ./VoiceCraft.Client/VoiceCraft.Client.MacOS/bin/Release/net9.0-macos/osx-${{ matrix.arch }}/VoiceCraft.Client.MacOS.${{ matrix.arch }}.pkg

  VoiceCraft-Server-Windows:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        arch: [ x64, x86, arm64 ]
      fail-fast: false
    defaults:
      run:
        working-directory: ./VoiceCraft.Server
    steps:
      - uses: actions/checkout@v5
      - name: Setup Dotnet
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: "9.0.x"

      - name: Install WorkLoads
        run: dotnet workload restore

      - name: Publish Build
        run: dotnet publish -c Release -r win-${{ matrix.arch }} -p:PublishSingleFile=true

      - name: Upload Artifact
        uses: actions/upload-artifact@v6
        with:
          name: VoiceCraft.Server.Windows.${{ matrix.arch }}
          path: ./VoiceCraft.Server/bin/Release/net9.0/win-${{ matrix.arch }}/publish
  
  VoiceCraft-Server-Linux:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        arch: [ x64, arm, arm64 ]
      fail-fast: false
    defaults:
      run:
        working-directory: ./VoiceCraft.Server
    steps:
      - uses: actions/checkout@v5
      - name: Setup Dotnet
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: "9.0.x"

      - name: Install WorkLoads
        run: dotnet workload restore

      - name: Publish Build
        run: dotnet publish -c Release -r linux-${{ matrix.arch }} -p:PublishSingleFile=true

      - name: Upload Artifact
        uses: actions/upload-artifact@v6
        with:
          name: VoiceCraft.Server.Linux.${{ matrix.arch }}
          path: ./VoiceCraft.Server/bin/Release/net9.0/linux-${{ matrix.arch }}/publish
